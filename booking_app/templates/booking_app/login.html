{% extends 'booking_app/base.html' %}
{% block title %}Login — SecureBook{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
<div class="card p-4 mt-4">
    <h3 class="mb-4 text-center">🔐 Login</h3>
    <form method="post" autocomplete="off" novalidate>
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            <input type="{{ field.field.widget.input_type }}"
                   name="{{ field.html_name }}"
                   class="form-control {% if field.errors %}is-invalid{% endif %}"
                   {% if field.html_name == 'username' %}autocomplete="username"{% endif %}
                   {% if field.html_name == 'password' %}autocomplete="current-password"{% endif %}
                   required>
            {% for error in field.errors %}
            <div class="invalid-feedback">{{ error }}</div>
            {% endfor %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>
    </form>
    <p class="text-center mt-3 text-muted">No account? <a href="{% url 'register' %}">Register here</a></p>
</div>
</div>
</div>
{% endblock %}
